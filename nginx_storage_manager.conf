server {
    server_name 2yx4m1a3.eaata.pro;

    # Aumentar limite de upload para v  deos grandes
    client_max_body_size 500M;

    # Frontend (Painel Visual)
    location / {
        proxy_pass http://localhost:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Backend API
    location /api {
        proxy_pass http://localhost:3005;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Timeouts longos para o Optimizer (Batch processing)
    proxy_read_timeout 600s;
    proxy_connect_timeout 600s;
    proxy_send_timeout 600s;

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/2yx4m1a3.eaata.pro/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/2yx4m1a3.eaata.pro/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = 2yx4m1a3.eaata.pro) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name 2yx4m1a3.eaata.pro;
    return 404; # managed by Certbot


}
